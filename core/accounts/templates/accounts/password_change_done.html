{% extends "bookings/base.html" %}
{% block title %}Password Changed{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 text-center">
    <div class="card shadow-sm">
      <div class="card-body py-5">
        <i class="bi bi-shield-check display-3 text-success mb-3"></i>
        <h2 class="h4 mb-2">Password Updated</h2>
        <p class="text-muted mb-4">Your password has been changed successfully.</p>
        <a href="{% url 'accounts:profile' %}" class="btn btn-primary">
          <i class="bi bi-person-circle me-1"></i> Back to Profile
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
